# Validate this file:
#   curl --data-binary @.codecov.yml https://codecov.io/validate

# Threshold should not be as high once all packages are being tracked.

comment:
  behavior: default
  layout: "diff, flags, files"

coverage:
  precision: 2
  round: down
  range: "25...100"
  status:
    project:
      default:
        threshold: 25%
        if_not_found: success
    patch:
      default:
        threshold: 25%
        if_not_found: success

flags:
  go:
    paths:
    - "**/*.go"
  go-smoke:
    paths:
    - "**/*.go"
  frontend:
    paths:
    - "frontend/"

ignore:
- "build"
- "hack"
- "ui"
- "website"
- "fake"
- "gen"
