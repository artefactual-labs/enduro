on:
  pull_request:
  push:
    branches:
      - main
name: Test
jobs:
  mod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Check go.mod
        run: go mod tidy -diff
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Test
        run: make test-ci
      - name: Upload coverage to Codecov
        if: github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          disable_search: true
          fail_ci_if_error: true
          files: covreport
          flags: go
      - name: Upload test results to Codecov
        if: github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        with:
          disable_search: true
          fail_ci_if_error: true
          files: junit.xml
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}
  smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Configure Dagger engine cache
        run: |
          mkdir -p "$HOME/.config/dagger"
          cat > "$HOME/.config/dagger/engine.json" <<'JSON'
          {
            "gc": {
              "maxUsedSpace": "30GB",
              "reservedSpace": "6GB",
              "minFreeSpace": "15GB",
              "sweepSize": "50%"
            }
          }
          JSON
      - name: Run smoke tests
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
        env:
          DAGGER_NO_NAG: "1"
        with:
          verb: call
          module: hack/dagger
          args: smoke-tests --source . export --path hack/dagger/runtime/artifacts
      - name: Upload smoke coverage to Codecov
        if: github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          disable_search: true
          fail_ci_if_error: true
          files: hack/dagger/runtime/artifacts/enduro-smoke.coverprofile
          flags: go-smoke
      - name: Upload smoke test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-test-artifacts
          path: hack/dagger/runtime/artifacts
          if-no-files-found: ignore
  object-storage-smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        provider:
          - minio-legacy
          - minio-latest
          - seaweedfs
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Configure Dagger engine cache
        run: |
          mkdir -p "$HOME/.config/dagger"
          cat > "$HOME/.config/dagger/engine.json" <<'JSON'
          {
            "gc": {
              "maxUsedSpace": "30GB",
              "reservedSpace": "6GB",
              "minFreeSpace": "15GB",
              "sweepSize": "50%"
            }
          }
          JSON
      - name: Run object storage smoke tests
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
        env:
          DAGGER_NO_NAG: "1"
        with:
          verb: call
          module: hack/dagger
          args: object-storage-smoke-test --source . --provider ${{ matrix.provider }} export --path hack/dagger/runtime/object-storage-artifacts-${{ matrix.provider }}
      - name: Upload object storage smoke coverage to Codecov
        if: github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          disable_search: true
          fail_ci_if_error: true
          files: hack/dagger/runtime/object-storage-artifacts-${{ matrix.provider }}/enduro-smoke.coverprofile
          flags: go-smoke-object-storage-${{ matrix.provider }}
      - name: Upload object storage smoke test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: object-storage-smoke-test-artifacts-${{ matrix.provider }}
          path: hack/dagger/runtime/object-storage-artifacts-${{ matrix.provider }}
          if-no-files-found: ignore
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Install frontend dependencies
        run: npm ci --prefix frontend
      - name: Lint frontend
        run: npm run lint --prefix frontend
      - name: Typecheck frontend
        run: npm run typecheck --prefix frontend
      - name: Test frontend with coverage
        run: npm run test:coverage --prefix frontend
      - name: Build frontend
        run: npm run build --prefix frontend
      - name: Upload frontend coverage to Codecov
        if: github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          disable_search: true
          fail_ci_if_error: true
          files: frontend/coverage/lcov.info
          flags: frontend
